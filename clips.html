<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mortal. // Clips</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Inter:wght@200;400;600&family=Noto+Serif+SC:wght@300;400&display=swap');

        body {
            background-color: #121212; 
            color: #EFEFEF;
            font-family: 'Inter', 'Noto Serif SC', sans-serif;
            margin: 0; padding: 0;
            overflow-x: hidden;
        }

        .font-serif-eng { font-family: 'Cormorant Garamond', serif; }
        .font-serif-zh { font-family: 'Noto Serif SC', serif; }

        /* 极简呼吸灯鼠标圈 */
        #custom-cursor {
            width: 8px; height: 8px; background-color: #EFEFEF;
            border-radius: 50%; position: fixed; transform: translate(-50%, -50%);
            pointer-events: none; z-index: 9999; transition: width 0.3s, height 0.3s, background-color: 0.3s;
        }
        #cursor-blur {
            width: 40px; height: 40px; border: 1px solid rgba(239, 239, 239, 0.2);
            border-radius: 50%; position: fixed; transform: translate(-50%, -50%);
            pointer-events: none; z-index: 9998;
        }

        /* 胶片噪点 */
        .grain-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3e%3cfilter id='noiseFilter'%3e%3cfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3e%3c/filter%3e%3crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3e%3c/svg%3e");
            opacity: 0.015; pointer-events: none; z-index: 9990;
        }

        /* 视频全屏放大容器的基础样式 */
        .video-reveal-container {
            width: 70vw; /* 初始宽度较小 */
            height: 80vh;
            border-radius: 24px;
            overflow: hidden;
            position: relative;
            transform-origin: center center;
            will-change: width, border-radius;
        }

        ::-webkit-scrollbar { width: 0px; background: transparent; }
    </style>
</head>
<body class="relative selection:bg-stone-200 selection:text-black">

    <div class="grain-overlay"></div>
    <div id="custom-cursor" class="hidden md:block"></div>
    <div id="cursor-blur" class="hidden md:block"></div>

    <header class="fixed top-0 left-0 w-full z-50 p-6 flex justify-between items-center mix-blend-difference">
        <a href="index.html" class="text-xl font-light tracking-widest lowercase text-[#EFEFEF]">mortal.</a>
        <div class="flex gap-8 text-[11px] tracking-[0.2em] uppercase font-light text-[#EFEFEF]/60">
            <a href="cinema.html" class="hover:text-[#EFEFEF] transition-colors">01. Cinema</a>
            <a href="library.html" class="hover:text-[#EFEFEF] transition-colors">02. Library</a>
            <a href="muses.html" class="hover:text-[#EFEFEF] transition-colors">03. Muses</a>
            <a href="clips.html" class="text-[#EFEFEF] font-semibold border-b border-[#EFEFEF]/40 pb-1">04. Clips</a>
        </div>
    </header>

    <section class="min-h-screen flex flex-col justify-center items-center px-8">
        <div class="max-w-2xl text-center space-y-6">
            <p class="text-xs tracking-[0.4em] uppercase opacity-40">04 / MOTION CLIPS</p>
            <h1 class="font-serif-zh font-light text-2xl md:text-3xl text-stone-300 leading-relaxed">
                “生活不是你活过的样子，而是你记住的样子。”
            </h1>
            <p class="text-[10px] tracking-widest uppercase text-stone-600">Cinematic fragments of ordinary days.</p>
        </div>
        <div class="absolute bottom-12 opacity-20 text-[9px] tracking-[0.3em] animate-bounce">SCROLL TO UNVEIL ↓</div>
    </section>

    <section id="video-reveal-trigger" class="relative h-[200vh] w-full flex flex-col items-center">
        <div class="sticky top-0 h-screen w-full flex justify-center items-center overflow-hidden">
            <div id="reveal-video-box" class="video-reveal-container shadow-2xl">
                <video src="https://assets.mixkit.co/videos/preview/mixkit-cinematic-foggy-pine-forest-and-mountains-41712-large.mp4" 
                       autoplay loop muted playsinline 
                       class="w-full h-full object-cover"></video>
                
                <div id="video-caption" class="absolute inset-0 flex flex-col justify-center items-center bg-black/20 text-center">
                    <h2 class="font-serif-eng italic text-4xl md:text-6xl text-white tracking-widest opacity-80">Life fragments.</h2>
                </div>
            </div>
        </div>
    </section>

    <section class="py-48 px-8 max-w-6xl mx-auto">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-12">
            
            <div class="space-y-4">
                <div class="aspect-video bg-stone-900 rounded-lg overflow-hidden group">
                    <video src="https://assets.mixkit.co/videos/preview/mixkit-slow-motion-of-a-woman-in-a-field-34271-large.mp4" 
                           loop muted onmouseenter="this.play()" onmouseleave="this.pause()"
                           class="w-full h-full object-cover opacity-80 group-hover:opacity-100 transition-opacity duration-700"></video>
                </div>
                <div class="text-[10px] tracking-widest text-stone-500 uppercase flex justify-between">
                    <span>Scene 01 // 旷野</span>
                    <span>2026</span>
                </div>
            </div>

            <div class="space-y-4 md:mt-24">
                <div class="aspect-video bg-stone-900 rounded-lg overflow-hidden group">
                    <video src="https://assets.mixkit.co/videos/preview/mixkit-waves-coming-to-the-beach-shore-at-night-4122-large.mp4" 
                           loop muted onmouseenter="this.play()" onmouseleave="this.pause()"
                           class="w-full h-full object-cover opacity-80 group-hover:opacity-100 transition-opacity duration-700"></video>
                </div>
                <div class="text-[10px] tracking-widest text-stone-500 uppercase flex justify-between">
                    <span>Scene 02 // 潮汐</span>
                    <span>2026</span>
                </div>
            </div>

            <div class="space-y-4">
                <div class="aspect-video bg-stone-900 rounded-lg overflow-hidden group">
                    <video src="https://assets.mixkit.co/videos/preview/mixkit-pov-walking-through-a-green-forest-4504-large.mp4" 
                           loop muted onmouseenter="this.play()" onmouseleave="this.pause()"
                           class="w-full h-full object-cover opacity-80 group-hover:opacity-100 transition-opacity duration-700"></video>
                </div>
                <div class="text-[10px] tracking-widest text-stone-500 uppercase flex justify-between">
                    <span>Scene 03 // 漫步</span>
                    <span>2026</span>
                </div>
            </div>

        </div>
    </section>

    <footer class="py-20 text-center opacity-30 text-[9px] tracking-[0.3em] uppercase">
        © 2026 mortal. // end of exhibition.
        <div class="mt-8">
            <a href="index.html" class="hover:opacity-100 border-b border-white/20 pb-1 transition-all">Back to Hall</a>
        </div>
    </footer>

    <script>
        gsap.registerPlugin(ScrollTrigger);

        // 1. 指针跟随
        const cursor = document.getElementById('custom-cursor');
        const blur = document.getElementById('cursor-blur');
        document.addEventListener('mousemove', (e) => {
            gsap.to(cursor, { x: e.clientX, y: e.clientY, duration: 0.1 });
            gsap.to(blur, { x: e.clientX, y: e.clientY, duration: 0.2 });
        });

        // 2. 🔮 Apple 级滚动放大核心动效
        gsap.to("#reveal-video-box", {
            scrollTrigger: {
                trigger: "#video-reveal-trigger",
                start: "top top",
                end: "bottom bottom",
                scrub: true // 关键：将动画与滚动进度百分百绑定
            },
            width: "100vw",       // 宽度扩充至全屏
            height: "100vh",      // 高度扩充至全屏
            borderRadius: "0px",  // 圆角变直角
            ease: "none"
        });

        // 视频上的文字淡出
        gsap.to("#video-caption", {
            scrollTrigger: {
                trigger: "#video-reveal-trigger",
                start: "top top",
                end: "center center",
                scrub: true
            },
            opacity: 0,
            scale: 1.5
        });

        // 3. 鼠标交互反馈
        document.querySelectorAll('a, video').forEach(item => {
            item.addEventListener('mouseenter', () => {
                cursor.style.width = '30px'; cursor.style.height = '30px';
                cursor.style.backgroundColor = 'rgba(239,239,239,0.1)';
            });
            item.addEventListener('mouseleave', () => {
                cursor.style.width = '8px'; cursor.style.height = '8px';
                cursor.style.backgroundColor = '#EFEFEF';
            });
        });
    </script>
</body>
</html>
