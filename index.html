<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mortal. // A Curated Museum</title>
    
    <!-- 稳定的 Tailwind v3 CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- GSAP 核心动效 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Inter:wght@200;400;600&display=swap');

        body {
            background-color: #F4F3EF; /* 喜茶燕麦白 */
            color: #121212;
            font-family: 'Inter', sans-serif;
            overflow: hidden; /* 首页作为纯粹的大门，不需要滚动条 */
            margin: 0; padding: 0;
        }

        .font-serif { font-family: 'Cormorant Garamond', serif; }

        /* 极简呼吸灯鼠标圈（高级交互大招 1） */
        #custom-cursor {
            width: 8px; height: 8px; background-color: #121212;
            border-radius: 50%; position: fixed; transform: translate(-50%, -50%);
            pointer-events: none; z-index: 9999; transition: width 0.3s, height 0.3s, background-color: 0.3s;
        }
        #cursor-blur {
            width: 40px; height: 40px; border: 1px solid rgba(18, 18, 18, 0.2);
            border-radius: 50%; position: fixed; transform: translate(-50%, -50%);
            pointer-events: none; z-index: 9998;
        }

        /* 1% 胶片噪点 */
        .grain-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3e%3cfilter id='noiseFilter'%3e%3cfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3e%3c/filter%3e%3crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3e%3c/svg%3e");
            opacity: 0.015; pointer-events: none; z-index: 9990;
        }
    </style>
</head>
<body class="h-screen w-screen flex flex-col justify-between p-8 relative selection:bg-stone-800 selection:text-white">

    <!-- 胶片噪点与自定义鼠标 -->
    <div class="grain-overlay"></div>
    <div id="custom-cursor" class="hidden md:block"></div>
    <div id="cursor-blur" class="hidden md:block"></div>

    <!-- HEADER: 导航大门 -->
    <header class="w-full flex justify-between items-center z-50">
        <a href="index.html" class="text-xl font-light tracking-widest lowercase hover:opacity-50 transition-opacity">mortal.</a>
        <!-- 注意：这里的链接全部改成了跳转到独立的网页文件 -->
        <div class="flex gap-8 text-[11px] tracking-[0.2em] uppercase opacity-60 font-light">
            <a href="cinema.html" class="nav-link hover:opacity-100 transition-opacity">01. Cinema</a>
            <a href="library.html" class="nav-link hover:opacity-100 transition-opacity">02. Library</a>
            <a href="muses.html" class="nav-link hover:opacity-100 transition-opacity">03. Muses</a>
            <a href="clips.html" class="nav-link hover:opacity-100 transition-opacity">04. Clips</a>
        </div>
    </header>

    <!-- CENTER: 纯白大厅高光 -->
    <main class="flex-1 flex flex-col justify-center items-center">
        <div id="hero-center" class="text-center opacity-0 transform translate-y-4">
            <h1 class="font-serif italic text-4xl md:text-6xl font-light tracking-wide text-stone-800 mb-6 select-none">
                “We are all stories in the end.”
            </h1>
            <p class="text-[10px] tracking-[0.3em] uppercase opacity-40 font-light block mb-8">
                A curated space of temporal beauty and fragments.
            </p>
            <!-- 进入按钮 -->
            <a href="cinema.html" class="inline-block text-[10px] tracking-[0.25em] uppercase border border-stone-800/30 rounded-full px-6 py-2.5 hover:bg-stone-800 hover:text-[#F4F3EF] transition-all duration-500">
                Enter Exhibition →
            </a>
        </div>
 main>

    <!-- FOOTER: 极简注脚 -->
    <footer class="w-full flex justify-between items-center text-[9px] tracking-widest uppercase opacity-30 z-50">
        <span>Curated by you.</span>
        <span>© 2026 all stories are temporary.</span>
    </footer>

    <script>
        // 1. 鼠标跟随大招
        const cursor = document.getElementById('custom-cursor');
        const blur = document.getElementById('cursor-blur');
        
        document.addEventListener('mousemove', (e) => {
            gsap.to(cursor, { x: e.clientX, y: e.clientY, duration: 0.1 });
            gsap.to(blur, { x: e.clientX, y: e.clientY, duration: 0.2 });
        });

        // 鼠标移入链接时圈圈放大（高级吸附感）
        document.querySelectorAll('a, .nav-link').forEach(link => {
            link.addEventListener('mouseenter', () => {
                cursor.style.width = '24px'; cursor.style.height = '24px';
                cursor.style.backgroundColor = 'rgba(18,18,18,0.1)';
            });
            link.addEventListener('mouseleave', () => {
                cursor.style.width = '8px'; cursor.style.height = '8px';
                cursor.style.backgroundColor = '#121212';
            });
        });

        // 2. 页面开场文字丝滑浮现动画
        window.addEventListener('DOMContentLoaded', () => {
            gsap.to("#hero-center", { opacity: 1, y: 0, duration: 1.8, ease: "power3.out", delay: 0.2 });
        });
    </script>
</body>
</html>
