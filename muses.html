<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mortal. // Muses</title>
    
    <!-- 稳定的 Tailwind v3 CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- GSAP 核心动效与滚动触发器 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Inter:wght@200;400;600&family=Noto+Serif+SC:wght@300;400&display=swap');

        body {
            background-color: #121212; 
            color: #EFEFEF;
            font-family: 'Inter', 'Noto Serif SC', sans-serif;
            overflow-x: hidden;
            margin: 0; padding: 0;
        }

        .font-serif-eng { font-family: 'Cormorant Garamond', serif; }
        .font-serif-zh { font-family: 'Noto Serif SC', serif; }

        /* 极简呼吸灯鼠标圈 */
        #custom-cursor {
            width: 8px; height: 8px; background-color: #EFEFEF;
            border-radius: 50%; position: fixed; transform: translate(-50%, -50%);
            pointer-events: none; z-index: 9999; transition: width 0.3s, height 0.3s, background-color: 0.3s;
        }
        #cursor-blur {
            width: 40px; height: 40px; border: 1px solid rgba(239, 239, 239, 0.2);
            border-radius: 50%; position: fixed; transform: translate(-50%, -50%);
            pointer-events: none; z-index: 9998;
        }

        /* 胶片噪点 */
        .grain-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3e%3cfilter id='noiseFilter'%3e%3cfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3e%3c/filter%3e%3crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3e%3c/svg%3e");
            opacity: 0.02; pointer-events: none; z-index: 9990;
        }

        /* 隐藏滚动条 */
        ::-webkit-scrollbar { width: 0px; background: transparent; }
    </style>
</head>
<body class="relative selection:bg-stone-200 selection:text-black">

    <div class="grain-overlay"></div>
    <div id="custom-cursor" class="hidden md:block"></div>
    <div id="cursor-blur" class="hidden md:block"></div>

    <!-- HEADER: 顶栏 -->
    <header class="fixed top-0 left-0 w-full z-50 p-6 flex justify-between items-center mix-blend-difference">
        <a href="index.html" class="text-xl font-light tracking-widest lowercase text-[#EFEFEF]">mortal.</a>
        <div class="flex gap-8 text-[11px] tracking-[0.2em] uppercase font-light text-[#EFEFEF]/60">
            <a href="cinema.html" class="hover:text-[#EFEFEF] transition-colors">01. Cinema</a>
            <a href="library.html" class="hover:text-[#EFEFEF] transition-colors">02. Library</a>
            <a href="muses.html" class="text-[#EFEFEF] font-semibold border-b border-[#EFEFEF]/40 pb-1">03. Muses</a>
            <a href="clips.html" class="hover:text-[#EFEFEF] transition-colors">04. Clips</a>
        </div>
    </header>

    <!-- MAIN CONTAINER -->
    <main class="max-w-6xl mx-auto px-8 py-32 min-h-screen">
        <p class="text-xs tracking-[0.3em] uppercase opacity-40 mb-32">03 / MUSES & VISUAL INSPIRATIONS</p>

        <!-- 🔮 错位视差流体画廊网格 -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-x-16 gap-y-32 relative z-10">
            
            <!-- 灵感卡片 1：慢速上升（数据速差：-60） -->
            <div class="muse-card space-y-4" data-speed="-60">
                <div class="overflow-hidden aspect-[3/4] bg-stone-900 rounded-sm">
                    <img src="https://images.unsplash.com/photo-1605721911519-3dfeb3be25e7?q=80&w=800" 
                         class="w-full h-full object-cover grayscale opacity-60 hover:grayscale-0 hover:opacity-100 transition-all duration-700 ease-out scale-105 hover:scale-100" alt="Muse 1">
                </div>
                <div class="flex justify-between items-start pt-2">
                    <div>
                        <h3 class="text-base font-light font-serif-zh text-stone-300">流动的寂静</h3>
                        <p class="text-[10px] tracking-widest uppercase text-stone-600 mt-1">Composition / No. 109</p>
                    </div>
                    <span class="font-serif-eng italic text-stone-700 text-xs">2026 //</span>
                </div>
            </div>

            <!-- 灵感卡片 2：快速上升（数据速差：40，且带有顶部的对齐偏移） -->
            <div class="muse-card space-y-4 md:mt-48" data-speed="40">
                <div class="overflow-hidden aspect-[4/5] bg-stone-900 rounded-sm">
                    <img src="https://images.unsplash.com/photo-1579783902614-a3fb3927b6a5?q=80&w=800" 
                         class="w-full h-full object-cover grayscale opacity-60 hover:grayscale-0 hover:opacity-100 transition-all duration-700 ease-out scale-105 hover:scale-100" alt="Muse 2">
                </div>
                <div class="flex justify-between items-start pt-2">
                    <div>
                        <h3 class="text-base font-light font-serif-zh text-stone-300">矛盾的秩序</h3>
                        <p class="text-[10px] tracking-widest uppercase text-stone-600 mt-1">Abstract Form / Structural</p>
                    </div>
                    <span class="font-serif-eng italic text-stone-700 text-xs">2026 //</span>
                </div>
            </div>

            <!-- 灵感卡片 3：极慢速（数据速差：-100） -->
            <div class="muse-card space-y-4" data-speed="-100">
                <div class="overflow-hidden aspect-[1/1] bg-stone-900 rounded-sm">
                    <img src="https://images.unsplash.com/photo-1541701494587-cb58502866ab?q=80&w=800" 
                         class="w-full h-full object-cover grayscale opacity-60 hover:grayscale-0 hover:opacity-100 transition-all duration-700 ease-out scale-105 hover:scale-100" alt="Muse 3">
                </div>
                <div class="flex justify-between items-start pt-2">
                    <div>
                        <h3 class="text-base font-light font-serif-zh text-stone-300">光的重塑</h3>
                        <p class="text-[10px] tracking-widest uppercase text-stone-600 mt-1">Light Capture / Architecture</p>
                    </div>
                    <span class="font-serif-eng italic text-stone-700 text-xs">2026 //</span>
                </div>
            </div>

            <!-- 灵感卡片 4：中速飞驰（数据速差：20） -->
            <div class="muse-card space-y-4 md:-mt-12" data-speed="20">
                <div class="overflow-hidden aspect-[2/3] bg-stone-900 rounded-sm">
                    <img src="https://images.unsplash.com/photo-1558591710-4b4a1ae0f04d?q=80&w=800" 
                         class="w-full h-full object-cover grayscale opacity-60 hover:grayscale-0 hover:opacity-100 transition-all duration-700 ease-out scale-105 hover:scale-100" alt="Muse 4">
                </div>
                <div class="flex justify-between items-start pt-2">
                    <div>
                        <h3 class="text-base font-light font-serif-zh text-stone-300">无声的喧嚣</h3>
                        <p class="text-[10px] tracking-widest uppercase text-stone-600 mt-1">Texture Memory / Organic</p>
                    </div>
                    <span class="font-serif-eng italic text-stone-700 text-xs">2026 //</span>
                </div>
            </div>

        </div>
    </main>

    <!-- FOOTER -->
    <footer class="py-20 text-center">
        <a href="index.html" class="inline-block text-[10px] tracking-[0.25em] uppercase border border-[#EFEFEF]/20 rounded-full px-6 py-2.5 hover:bg-[#EFEFEF] hover:text-[#121212] transition-all duration-500">
            ← Return To Main Hall
        </a>
    </footer>

    <!-- 核心动态脚本 -->
    <script>
        gsap.registerPlugin(ScrollTrigger);

        // 1. 极简指针跟随
        const cursor = document.getElementById('custom-cursor');
        const blur = document.getElementById('cursor-blur');
        document.addEventListener('mousemove', (e) => {
            gsap.to(cursor, { x: e.clientX, y: e.clientY, duration: 0.1 });
            gsap.to(blur, { x: e.clientX, y: e.clientY, duration: 0.2 });
        });

        document.querySelectorAll('a, .muse-card img').forEach(item => {
            item.addEventListener('mouseenter', () => {
                cursor.style.width = '24px'; cursor.style.height = '24px';
                cursor.style.backgroundColor = 'rgba(239,239,239,0.15)';
            });
            item.addEventListener('mouseleave', () => {
                cursor.style.width = '8px'; cursor.style.height = '8px';
                cursor.style.backgroundColor = '#EFEFEF';
            });
        });

        // 🔮 2. 核心：流体交错视差算法 (Fluid Parallax Effect)
        // 获取所有带有 data-speed 属性的灵感卡片，使其移动速度在滚动时产生分层
        document.querySelectorAll('.muse-card').forEach(card => {
            const speed = card.getAttribute('data-speed');
            
            gsap.to(card, {
                scrollTrigger: {
                    trigger: card,
                    start: "top bottom", // 当卡片顶部进入屏幕底部时开始计算
                    end: "bottom top",   // 当卡片底部离开屏幕顶部时结束
                    scrub: 1.2           // 阻尼感系数，数字越大，画面滑行越“粘稠”高级
                },
                y: speed,               // 运用卡片自带的独特速差值进行Y轴移动
                ease: "none"
            });
        });
    </script>
</body>
</html>
